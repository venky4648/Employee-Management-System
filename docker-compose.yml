services:
  server:
    build: ./server
    restart: unless-stopped
    environment:
      PORT: 3000
      MONGODB_URL: ${MONGODB_URL}
      JWT_SECRET: ${JWT_SECRET}
    volumes:
      - uploads:/app/public/uploads

  frontend:
    build: ./frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - server

volumes:
  uploads:
